# Dogfood config for the splashboard repo itself. Every shape and every registered renderer
# appears somewhere below so `cargo run` in this directory doubles as a visual smoke test for
# the 3-axis registry. Real users' configs will be much smaller.

[general]
wait_for_fresh = false
height = 32

# ── Lines shape: 4 renderers ──────────────────────────────────────────

[[widget]]
id = "greeting_simple"
fetcher = "static"
render = { type = "simple", align = "center" }
format = "welcome back"

[[widget]]
id = "clock"
fetcher = "clock"
render = { type = "ascii_art", pixel_size = "quadrant", align = "center" }

[[widget]]
id = "clock_figlet"
fetcher = "clock"
render = { type = "ascii_art", style = "figlet", align = "center" }

[[widget]]
id = "typewriter"
fetcher = "static"
render = "animated_typewriter"
format = "animated_typewriter:\nreveals character by character while --wait ticks"

[[widget]]
id = "notes"
fetcher = "static"
render = "list"
format = "ratatui::List widget\nalternative to simple\nselectable items, later"

# ── Entries ─────────────────────────────────────────────────────────

[[widget]]
id = "system"
fetcher = "system"
render = "table"

# ── Ratio: 2 renderers ──────────────────────────────────────────────

[[widget]]
id = "disk_gauge"
fetcher = "disk"
render = "gauge"

[[widget]]
id = "disk_line"
fetcher = "disk"
render = "line_gauge"

# ── NumberSeries ────────────────────────────────────────────────────

[[widget]]
id = "commits"
fetcher = "git_commits"
render = "sparkline"

# ── PointSeries: 2 renderers ────────────────────────────────────────

[[widget]]
id = "trend_line"
fetcher = "trend"
render = "chart_line"

[[widget]]
id = "trend_dots"
fetcher = "trend"
render = "scatter"

# ── Bars ────────────────────────────────────────────────────────────

[[widget]]
id = "prs"
fetcher = "github_prs"
render = "bar_chart"

# ── Calendar ────────────────────────────────────────────────────────

[[widget]]
id = "today"
fetcher = "today"
render = "calendar"

# ── Layout ──────────────────────────────────────────────────────────
# Hero row: clock front-and-center, chromeless. Greeting centered, also chromeless.
# Below, widgets pick their own chrome — some bordered for separation, some naked.

[[row]]
height = { length = 2 }

  [[row.child]]
  widget = "greeting_simple"
  border = "none"

[[row]]
height = { length = 4 }

  [[row.child]]
  widget = "clock"
  border = "none"

  [[row.child]]
  widget = "clock_figlet"
  border = "none"

[[row]]
height = { length = 4 }

  [[row.child]]
  widget = "typewriter"
  title = "animated_typewriter"
  border = "rounded"

  [[row.child]]
  widget = "notes"
  title = "list"
  border = "rounded"

[[row]]
height = { length = 3 }

  [[row.child]]
  widget = "disk_gauge"
  title = "gauge"
  border = "rounded"

  [[row.child]]
  widget = "disk_line"
  title = "line_gauge"
  border = "rounded"

[[row]]
height = { length = 5 }

  [[row.child]]
  widget = "commits"
  title = "sparkline"
  border = "rounded"

  [[row.child]]
  widget = "prs"
  title = "bar_chart"
  border = "rounded"

[[row]]
height = { length = 7 }

  [[row.child]]
  widget = "trend_line"
  title = "chart_line"
  border = "rounded"

  [[row.child]]
  widget = "trend_dots"
  title = "scatter"
  border = "rounded"

  [[row.child]]
  widget = "today"
  title = "calendar"
  border = "rounded"

[[row]]
height = { length = 6 }

  [[row.child]]
  widget = "system"
  title = "table"
  border = "rounded"
