# Dogfood config for the splashboard repo itself. Every shape and every registered renderer
# appears somewhere below so `cargo run` in this directory doubles as a visual smoke test for
# the 3-axis registry. Real users' configs will be much smaller.

[general]
wait_for_fresh = false
# `height` omitted — runtime auto-sizes the inline viewport to fit every configured row.
# Set it explicitly if you want padding below the last widget.

# ── Lines shape: 4 renderers ──────────────────────────────────────────

[[widget]]
id = "greeting_simple"
fetcher = "static"
render = { type = "simple", align = "center" }
format = "welcome back"

[[widget]]
id = "clock"
fetcher = "clock"
render = { type = "ascii_art", pixel_size = "quadrant", align = "center" }

[[widget]]
id = "clock_figlet"
fetcher = "clock"
render = { type = "ascii_art", style = "figlet", align = "center" }

[[widget]]
id = "typewriter"
fetcher = "static"
render = { type = "animated_typewriter", align = "center" }
format = "animated_typewriter:\nreveals character by character while --wait ticks"

[[widget]]
id = "notes"
fetcher = "static"
render = { type = "list", align = "center" }
format = "ratatui::List widget\nalternative to simple\nselectable items, later"

# ── Entries ─────────────────────────────────────────────────────────

[[widget]]
id = "system"
fetcher = "system"
render = "table"

# ── Badge: one status per fetcher; a row of badges is a layout concern ─
# Per-widget align converges the trio visually: the left slot right-aligns so its text hugs
# the centre, the centre slot centres, the right slot left-aligns so its text hugs the
# centre — the three labels cluster together inside a centred row.

[[widget]]
id = "ci"
fetcher = "ci_status"
render = { type = "badge", align = "right" }

[[widget]]
id = "deploy"
fetcher = "deploy_status"
render = { type = "badge", align = "center" }

[[widget]]
id = "oncall"
fetcher = "oncall_status"
render = { type = "badge", align = "left" }

# ── Ratio: 2 renderers ──────────────────────────────────────────────

[[widget]]
id = "disk_gauge"
fetcher = "disk"
render = "gauge"

[[widget]]
id = "disk_line"
fetcher = "disk"
render = "line_gauge"

# ── NumberSeries ────────────────────────────────────────────────────

[[widget]]
id = "commits"
fetcher = "git_commits"
render = "sparkline"

# ── PointSeries: 2 renderers ────────────────────────────────────────

[[widget]]
id = "trend_line"
fetcher = "trend"
render = "chart_line"

[[widget]]
id = "trend_dots"
fetcher = "trend"
render = "scatter"

# ── Bars ────────────────────────────────────────────────────────────

[[widget]]
id = "prs"
fetcher = "github_prs"
render = "bar_chart"

# ── Calendar ────────────────────────────────────────────────────────

[[widget]]
id = "today"
fetcher = "clock"
render = "calendar"

# ── Heatmap ─────────────────────────────────────────────────────────

[[widget]]
id = "contributions"
fetcher = "contributions"
render = { type = "heatmap", align = "center" }

# ── Timeline ────────────────────────────────────────────────────────

[[widget]]
id = "recent_commits"
fetcher = "git_recent_commits"
render = "timeline"

# ── ReadStore demo ──────────────────────────────────────────────────
# Renders whatever the user writes to $HOME/.splashboard/store/scratch.txt.
# One line per row. Missing file → the "nothing here yet" placeholder.

[[widget]]
id = "scratch"
fetcher = "read_store"
file_format = "text"
render = { type = "simple", align = "center" }

# ── System fetchers (sysinfo-backed, cross-platform) ─────────────────
# Each fetcher is multi-shape; the renderer pick below is one valid pairing.

[[widget]]
id = "cpu"
fetcher = "cpu_load"
render = "gauge"

[[widget]]
id = "memory"
fetcher = "memory"
render = "line_gauge"

[[widget]]
id = "uptime"
fetcher = "uptime"
render = { type = "simple", align = "center" }

[[widget]]
id = "load_avg"
fetcher = "load_average"
render = { type = "simple", align = "center" }

[[widget]]
id = "processes"
fetcher = "process_top"
render = "table"

# ── Layout ──────────────────────────────────────────────────────────
# Hero band: single-child rows with flex=center so the widget sits in the middle of the row
# even though it's narrower than the terminal. 2-column rows below keep the default Legacy
# flex so children split the row proportionally.

[[row]]
height = { length = 2 }
flex = "center"

  [[row.child]]
  widget = "greeting_simple"
  width = { length = 24 }

[[row]]
height = { length = 4 }
flex = "center"

  [[row.child]]
  widget = "clock"
  width = { length = 22 }

[[row]]
height = { length = 6 }
flex = "center"

  [[row.child]]
  widget = "clock_figlet"
  width = { length = 44 }

[[row]]
height = { length = 4 }
flex = "center"

  [[row.child]]
  widget = "typewriter"
  width = { length = 64 }

[[row]]
height = { length = 4 }
flex = "center"

  [[row.child]]
  widget = "notes"
  width = { length = 44 }

[[row]]
height = { length = 2 }
flex = "center"

  [[row.child]]
  widget = "ci"
  width = { length = 20 }

  [[row.child]]
  widget = "deploy"
  width = { length = 20 }

  [[row.child]]
  widget = "oncall"
  width = { length = 20 }

[[row]]
height = { length = 10 }

  [[row.child]]
  widget = "contributions"

[[row]]
height = { length = 5 }

  [[row.child]]
  widget = "scratch"

# ── Dense 2-column rows from here on, default Legacy flex ─────────────

[[row]]
height = { length = 3 }

  [[row.child]]
  widget = "disk_gauge"
  title = "gauge"
  border = "rounded"

  [[row.child]]
