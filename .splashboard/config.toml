# Dogfood config for the splashboard repo itself. Exercises every shipped fetcher family
# (static, clock_*, system_*, git_*, github_*, read_store) paired with a renderer that fits
# the data. Renderers intentionally dropped from this showcase: bar_chart / pie_chart /
# chart_line / scatter / calendar — they add visual noise without exercising anything the
# other showcases don't already cover.

[general]
wait_for_fresh = false
# `height` omitted — runtime auto-sizes the inline viewport to fit every configured row.

# ── Hero band (Text / TextBlock shapes, 4 renderers) ─────────────────

[[widget]]
id = "greeting_simple"
fetcher = "static"
render = { type = "simple", align = "center" }
format = "welcome back"

[[widget]]
id = "clock"
fetcher = "clock"
render = { type = "ascii_art", pixel_size = "quadrant", align = "center" }

[[widget]]
id = "typewriter"
fetcher = "static"
render = { type = "animated_typewriter", align = "center" }
format = "animated_typewriter:\nreveals character by character while --wait ticks"

[[widget]]
id = "notes"
fetcher = "static"
render = { type = "list", align = "center" }
format = "ratatui::List widget\nalternative to simple\nselectable items, later"

# ── GitHub activity ──────────────────────────────────────────────────
# Every repo-scope fetcher (repo_prs / repo_issues / repo_stars / action_*) auto-detects the
# owner/name slug from the cwd's git remote. User-scope (my_prs / review_requests /
# notifications / contributions) is tied to whoever's GH_TOKEN is loaded. Missing token →
# the fetchers render the shared placeholder payload rather than crashing the splash.

[[widget]]
id = "gh_action_status"
fetcher = "github_action_status"
render = { type = "badge", align = "center" }

[[widget]]
id = "gh_action_history"
fetcher = "github_action_history"
render = "sparkline"

[[widget]]
id = "gh_stars"
fetcher = "github_repo_stars"
render = { type = "simple", align = "center" }

[[widget]]
id = "gh_contributions"
fetcher = "github_contributions"
render = { type = "heatmap", align = "center" }

[[widget]]
id = "gh_my_prs"
fetcher = "github_my_prs"
render = "list"

[[widget]]
id = "gh_review_requests"
fetcher = "github_review_requests"
render = "list"

[[widget]]
id = "gh_repo_prs"
fetcher = "github_repo_prs"
render = "list"

[[widget]]
id = "gh_repo_issues"
fetcher = "github_repo_issues"
render = "list"

[[widget]]
id = "gh_notifications"
fetcher = "github_notifications"
render = "timeline"

[[widget]]
id = "gh_releases"
fetcher = "github_recent_releases"
render = "timeline"

[[widget]]
id = "gh_contributors"
fetcher = "github_contributors_monthly"
render = "table"
  [widget.options]
  limit = 5

# ── System ───────────────────────────────────────────────────────────

[[widget]]
id = "system"
fetcher = "system"
render = "table"

[[widget]]
id = "disk_gauge"
fetcher = "disk_usage"
render = "gauge"

[[widget]]
id = "disk_line"
fetcher = "disk_usage"
render = "line_gauge"

# ── Git (local, on-disk) ─────────────────────────────────────────────

[[widget]]
id = "commits"
fetcher = "git_commits_activity"
render = "sparkline"

[[widget]]
id = "recent_commits"
fetcher = "git_recent_commits"
render = "timeline"

# ── ReadStore demo ──────────────────────────────────────────────────
# Renders whatever the user writes to $HOME/.splashboard/store/scratch.txt.
# One line per row. Missing file → the "nothing here yet" placeholder.

[[widget]]
id = "scratch"
fetcher = "read_store"
file_format = "text"
render = { type = "simple", align = "center" }

# ── clock_* family showcase ──────────────────────────────────────────

[[widget]]
id = "world_clock"
fetcher = "clock_timezones"
render = "table"
  [widget.options]
  timezones = ["Asia/Tokyo", "Europe/London", "America/New_York"]

[[widget]]
id = "year_progress"
fetcher = "clock_ratio"
render = "gauge"
  [widget.options]
  period = "year"

[[widget]]
id = "business_hours"
fetcher = "clock_state"
render = { type = "badge", align = "center" }
  [widget.options]
  kind = "business_hours"

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = { type = "simple", align = "center" }
  [widget.options]
  kind = "moon_phase"

[[widget]]
id = "sun"
fetcher = "clock_sunrise"
render = { type = "simple", align = "center" }
  [widget.options]
  lat = 35.6762
  lon = 139.6503
  timezone = "Asia/Tokyo"

[[widget]]
id = "newyear_countdown"
fetcher = "clock_countdown"
render = { type = "simple", align = "center" }
  [widget.options]
  target = "2027-01-01"
  target_label = "New Year"

# ── system_* fetchers (sysinfo-backed, cross-platform) ───────────────

[[widget]]
id = "cpu"
fetcher = "system_cpu"
render = "gauge"

[[widget]]
id = "memory"
fetcher = "system_memory"
render = "line_gauge"

[[widget]]
id = "uptime"
fetcher = "system_uptime"
render = { type = "simple", align = "center" }

[[widget]]
id = "load_avg"
fetcher = "system_load"
render = { type = "simple", align = "center" }

[[widget]]
id = "processes"
fetcher = "system_processes"
render = "table"

# ── Layout ──────────────────────────────────────────────────────────
# Hero band: single-child rows with flex=center so the widget sits in the middle of the row
# even though it's narrower than the terminal. 2-column rows below keep the default Legacy
# flex so children split the row proportionally.

[[row]]
height = { length = 2 }
flex = "center"

  [[row.child]]
  widget = "greeting_simple"
  width = { length = 24 }

[[row]]
height = { length = 4 }
flex = "center"

  [[row.child]]
  widget = "clock"
  width = { length = 22 }

[[row]]
