# Dogfood config for the splashboard repo itself. Every shape and every registered renderer
# appears somewhere below so `cargo run` in this directory doubles as a visual smoke test for
# the 3-axis registry. Real users' configs will be much smaller.

[general]
wait_for_fresh = false
height = 36

# ── Lines shape: 4 renderers ──────────────────────────────────────────

[[widget]]
id = "greeting_simple"
fetcher = "static"
render = { type = "simple", align = "center" }
format = "welcome back"

[[widget]]
id = "clock"
fetcher = "clock"
render = { type = "ascii_art", pixel_size = "quadrant", align = "center" }

[[widget]]
id = "clock_figlet"
fetcher = "clock"
render = { type = "ascii_art", style = "figlet", align = "center" }

[[widget]]
id = "typewriter"
fetcher = "static"
render = { type = "animated_typewriter", align = "center" }
format = "animated_typewriter:\nreveals character by character while --wait ticks"

[[widget]]
id = "notes"
fetcher = "static"
render = { type = "list", align = "center" }
format = "ratatui::List widget\nalternative to simple\nselectable items, later"

# ── Entries ─────────────────────────────────────────────────────────

[[widget]]
id = "system"
fetcher = "system"
render = "table"

# ── Ratio: 2 renderers ──────────────────────────────────────────────

[[widget]]
id = "disk_gauge"
fetcher = "disk"
render = "gauge"

[[widget]]
id = "disk_line"
fetcher = "disk"
render = "line_gauge"

# ── NumberSeries ────────────────────────────────────────────────────

[[widget]]
id = "commits"
fetcher = "git_commits"
render = "sparkline"

# ── PointSeries: 2 renderers ────────────────────────────────────────

[[widget]]
id = "trend_line"
fetcher = "trend"
render = "chart_line"

[[widget]]
id = "trend_dots"
fetcher = "trend"
render = "scatter"

# ── Bars ────────────────────────────────────────────────────────────

[[widget]]
id = "prs"
fetcher = "github_prs"
render = "bar_chart"

# ── Calendar ────────────────────────────────────────────────────────

[[widget]]
id = "today"
fetcher = "today"
render = "calendar"

# ── Layout ──────────────────────────────────────────────────────────
# Hero band: single-child rows with flex=center so the widget sits in the middle of the row
# even though it's narrower than the terminal. 2-column rows below keep the default Legacy
# flex so children split the row proportionally.

[[row]]
height = { length = 2 }
flex = "center"

  [[row.child]]
  widget = "greeting_simple"
  width = { length = 24 }

[[row]]
height = { length = 4 }
flex = "center"

  [[row.child]]
  widget = "clock"
  width = { length = 22 }

[[row]]
height = { length = 6 }
flex = "center"

  [[row.child]]
  widget = "clock_figlet"
  width = { length = 44 }

[[row]]
height = { length = 4 }
flex = "center"

  [[row.child]]
  widget = "typewriter"
  width = { length = 64 }

[[row]]
height = { length = 4 }
flex = "center"

  [[row.child]]
  widget = "notes"
  width = { length = 44 }

# ── Dense 2-column rows from here on, default Legacy flex ─────────────

[[row]]
height = { length = 3 }

  [[row.child]]
  widget = "disk_gauge"
  title = "gauge"
  border = "rounded"

  [[row.child]]
  widget = "disk_line"
  title = "line_gauge"
  border = "rounded"

[[row]]
height = { length = 5 }

  [[row.child]]
  widget = "commits"
  title = "sparkline"
  border = "rounded"

  [[row.child]]
  widget = "prs"
  title = "bar_chart"
  border = "rounded"

[[row]]
height = { length = 7 }

  [[row.child]]
  widget = "trend_line"
  title = "chart_line"
  border = "rounded"

  [[row.child]]
  widget = "trend_dots"
  title = "scatter"
  border = "rounded"

  [[row.child]]
  widget = "today"
  title = "calendar"
  border = "rounded"

[[row]]
height = { length = 6 }

  [[row.child]]
  widget = "system"
  title = "table"
  border = "rounded"
