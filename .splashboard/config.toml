# Dogfood config — rendered in project_github_activity style (#77). When someone cd's
# into this repo, they see the polished preset we ship. Hero / subtitle / section
# dividers / body. No panel borders: breathing rows + static dividers give structure.
#
# Placeholders for #79 / #81 features not yet landed:
#   - hero uses `static "splashboard"` (→ `project_name` fetcher post-#81)
#   - subtitle is hand-written (→ `project` Entries fetcher post-#81)
#   - hero uses `text_ascii` blocks quadrant (→ figlet banner font post-#79)

[general]
wait_for_fresh = false
padding = { x = 2, y = 1 }

# ── Hero ─────────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "static"
format = "splashboard"
render = { type = "animated_postfx", inner = "text_ascii", effect = "hsl_shift", duration_ms = 1800, pixel_size = "quadrant", align = "center" }

[[widget]]
id = "subtitle"
fetcher = "static"
format = "unhappychoice/splashboard · terminal splash renderer · MIT"
render = { type = "text_plain", align = "center" }

# ── Section dividers ────────────────────────────────────────────────

[[widget]]
id = "div_commits"
fetcher = "static"
format = "───  recent commits  ─────────────────────────────────"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "div_ci"
fetcher = "static"
format = "───  CI  ─────────────────────────────────────────────"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "div_open"
fetcher = "static"
format = "───  open  ───────────────────────────────────────────"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "div_released"
fetcher = "static"
format = "───  released  ───────────────────────────────────────"
render = { type = "text_plain", align = "center" }

# ── Body widgets ────────────────────────────────────────────────────

[[widget]]
id = "recent_commits"
fetcher = "git_recent_commits"
format = "10"
render = { type = "list_timeline", align = "center" }

[[widget]]
id = "ci_status"
fetcher = "github_action_status"
render = { type = "status_badge", align = "center" }

[[widget]]
id = "repo_prs"
fetcher = "github_repo_prs"
render = "list_plain"

[[widget]]
id = "repo_issues"
fetcher = "github_repo_issues"
render = "list_plain"

[[widget]]
id = "releases"
fetcher = "github_recent_releases"
render = "list_timeline"

# ── Layout ──────────────────────────────────────────────────────────
# hero → subtitle → (divider → body) × 5。各セクション後に空行で breathing。

[[row]]
height = { length = 1 }
bg = "subtle"

[[row]]
height = { length = 6 }
bg = "subtle"
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }
bg = "subtle"
  [[row.child]]
  widget = "subtitle"

[[row]]
height = { length = 1 }
bg = "subtle"

[[row]]
height = { length = 1 }

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "div_commits"

[[row]]
height = { length = 8 }
  [[row.child]]
  widget = "recent_commits"

[[row]]
height = { length = 1 }

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "div_ci"

[[row]]
height = { length = 2 }
  [[row.child]]
  widget = "ci_status"

[[row]]
height = { length = 1 }

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "div_open"

[[row]]
height = { length = 8 }
  [[row.child]]
  widget = "repo_prs"
  [[row.child]]
  widget = "repo_issues"

[[row]]
height = { length = 1 }

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "div_released"

[[row]]
height = { length = 6 }
  [[row.child]]
  widget = "releases"
