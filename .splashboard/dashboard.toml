# Dogfood dashboard — rendered in project_github_activity style (#77). When someone cd's
# into this repo, they see the polished preset we ship. Header band (hero + subtitle +
# stats) full-width with `bg = "subtle"`; body pairs each section into 2-column rows
# so the dashboard reads as a tight grid rather than a tall stack.
#
# Dashboard files hold only widgets + rows. User preferences ([general], [theme]) live in
# `$HOME/.splashboard/settings.toml` — padding, viewport height, theme preset, etc. belong
# there so they apply to every dashboard the same user sees.
#
# Everything is fetched at draw time — hero + subtitle come from `git_repo_name` +
# `github_repo` (git origin + GitHub API), stats/activity from git_* / github_* fetchers.

# ── Header ───────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "git_repo_name"
render = { type = "animated_postfx", inner = "text_ascii", effect = "coalesce", duration_ms = 1500, style = "figlet", font = "banner", color = "panel_title", align = "center" }

# Subtitle: `github_repo` emits TextBlock (slug / description / license on their
# own rows). `text_plain` renders via ratatui's `Paragraph` which centers each
# line individually, so short lines like "ISC" still sit under the hero
# centreline instead of hugging the block's left edge.
[[widget]]
id = "subtitle"
fetcher = "github_repo"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "repo_stats"
fetcher = "github_repo_stars"
render = { type = "grid_table", layout = "inline", align = "center" }

# ── Body widgets ────────────────────────────────────────────────────

[[widget]]
id = "repo_prs"
fetcher = "github_repo_prs"
render = { type = "list_plain", bullet = "•", max_items = 5 }

[[widget]]
id = "repo_issues"
fetcher = "github_repo_issues"
render = { type = "list_plain", bullet = "•", max_items = 5 }

[[widget]]
id = "commits_heatmap"
fetcher = "git_commits_activity"
render = "grid_heatmap"

[[widget]]
id = "top_contributors"
fetcher = "git_contributors"
render = { type = "chart_bar", max_bars = 5 }

[[widget]]
id = "languages"
fetcher = "github_languages"
render = { type = "chart_bar", horizontal = true }

[[widget]]
id = "releases"
fetcher = "github_recent_releases"
render = { type = "list_timeline", bullet = "●", date_format = "relative", max_items = 3 }

# Horizontal spacer between sibling containers — a no-op `basic_static` with
# empty format renders nothing, the width = { length = … } in the row carves the gap.
[[widget]]
id = "gap"
fetcher = "basic_static"
format = ""
render = "text_plain"

# ── Layout ──────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }
bg = "subtle"

# Hero gets the full band width — figlet `banner` at 8 rows tall / ~8 cells per
# glyph overflows a 70-cell box, so let it breathe across the whole subtle band.
# The inner `align = "center"` in the render options keeps it centered.
[[row]]
height = { length = 8 }
bg = "subtle"
  [[row.child]]
  widget = "hero"

# Subtitle: 3 stacked lines (slug / description / license) via github_repo's
# TextBlock shape. Centered on a 70-cell column inside the band.
[[row]]
height = { length = 3 }
bg = "subtle"
flex = "center"
  [[row.child]]
  widget = "subtitle"
  width = { length = 70 }

[[row]]
height = { length = 1 }
bg = "subtle"
flex = "center"
  [[row.child]]
  widget = "repo_stats"
  width = { length = 70 }

[[row]]
height = { length = 1 }
bg = "subtle"

[[row]]
height = { length = 1 }

# Row 1: languages horizontal bar chart | releases timeline.
[[row]]
height = { length = 6 }
flex = "center"
  [[row.child]]
  widget = "languages"
  width = { length = 34 }
  border = "top"
  title = "languages"
  [[row.child]]
  widget = "gap"
  width = { length = 2 }
  [[row.child]]
  widget = "releases"
  width = { length = 34 }
  border = "top"
  title = "released"

[[row]]
height = { length = 1 }

# Row 2: PRs | issues — two list_plain columns.
[[row]]
height = { length = 9 }
flex = "center"
  [[row.child]]
  widget = "repo_prs"
  width = { length = 34 }
  border = "top"
  title = "PRs"
  [[row.child]]
  widget = "gap"
  width = { length = 2 }
  [[row.child]]
  widget = "repo_issues"
  width = { length = 34 }
  border = "top"
  title = "issues"

[[row]]
height = { length = 1 }

# Row 3: commits heatmap | top contributors. Heatmap shows the 52-week
# contribution grid (repo-level, not viewer-level). Top contributors is a
# horizontal bar chart capped at 5.
[[row]]
height = { length = 10 }
flex = "center"
  [[row.child]]
  widget = "commits_heatmap"
  width = { length = 34 }
  border = "top"
  title = "commits"
  [[row.child]]
  widget = "gap"
  width = { length = 2 }
  [[row.child]]
  widget = "top_contributors"
  width = { length = 34 }
  border = "top"
  title = "top contributors"
