[general]
wait_for_fresh = false

[[widget]]
id = "greeting"
fetcher = "static"
render = "simple"
format = "Hello, splashboard!"

[[widget]]
id = "clock"
fetcher = "clock"
render = "ascii_art"

[[widget]]
id = "disk"
fetcher = "disk"
render = "gauge"

[[widget]]
id = "commits"
fetcher = "git_commits"
render = "sparkline"

[[widget]]
id = "system"
fetcher = "system"
render = "table"

[[widget]]
id = "prs"
fetcher = "github_prs"
render = "bar_chart"

[[widget]]
id = "contributions"
fetcher = "contributions"
render = "heatmap"

[[row]]
height = { min = 6 }

  [[row.child]]
  widget = "greeting"

  [[row.child]]
  widget = "clock"

[[row]]
height = { length = 7 }

  [[row.child]]
  widget = "contributions"
  title = "Contributions (1y)"
  border = "rounded"

[[row]]
height = { length = 5 }

  [[row.child]]
  widget = "disk"
  title = "Disk /"
  border = "rounded"

  [[row.child]]
  widget = "commits"
  title = "Commits (14d)"
  border = "rounded"

[[row]]
height = { length = 5 }

  [[row.child]]
  widget = "system"
  title = "System"
  border = "rounded"

  [[row.child]]
  widget = "prs"
  title = "Open PRs"
  border = "rounded"
