# home_github — "my github" preset. Avatar on the left + handle as a figlet hero on
# the right, contribution heatmap full-width (needs 52 weeks × 2 cells to read), then
# attention lane (open PRs / review queue) and a recent activity timeline share the
# same 70-col body band used by the other 0.x presets.
#
# Edit `format` on the `hero` widget to your handle (the figlet banner) and set
# `[widget.options].user` on `avatar` if git config doesn't resolve a GitHub identity.
# Requires `gh auth login` (or `GITHUB_TOKEN`) for the `github_*` fetchers.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "avatar"
fetcher = "github_avatar"
render = { type = "media_image", fit = "contain", max_width = 14, max_height = 7, align = "left" }

[[widget]]
id = "hero"
fetcher = "static"
format = "github"
render = { type = "text_ascii", style = "figlet", font = "small", color = "panel_title", align = "left" }

[[widget]]
id = "subtitle"
fetcher = "static"
format = "github profile"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "contributions"
fetcher = "github_contributions"
render = { type = "grid_heatmap", align = "center" }

[[widget]]
id = "my_prs"
fetcher = "github_my_prs"
render = { type = "list_plain", bullet = "•", max_items = 4 }

[[widget]]
id = "review_queue"
fetcher = "github_review_requests"
render = { type = "list_plain", bullet = "•", max_items = 4 }

[[widget]]
id = "recent"
fetcher = "github_notifications"
render = { type = "list_timeline", bullet = "●", date_format = "relative", max_items = 5 }

[[widget]]
id = "gap"
fetcher = "static"
format = " "
render = "text_plain"

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Header band: avatar + handle figlet side by side, both hosted inside the 70-col
# centred band so it lines up with the body rows below. Avatar takes the first 16
# cells; the figlet handle fills the remaining 54.
[[row]]
height = { length = 7 }
flex = "center"
  [[row.child]]
  widget = "avatar"
  width = { length = 16 }
  [[row.child]]
  widget = "hero"
  width = { length = 54 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "subtitle"
  width = { length = 70 }

[[row]]
height = { length = 1 }

# Contributions heatmap: needs the full terminal width — 52 weeks × 2 cells per day
# overflows any narrower band. Titled rule pinned as a top border so the section
# reads as the main feature of the splash.
[[row]]
height = { length = 9 }
border = "top"
title = "contributions · last year"
  [[row.child]]
  widget = "contributions"

[[row]]
height = { length = 1 }

# Attention lane: PRs | review queue, two list_plain columns of 34 cells each with
# the gap between them, all inside the 70-col content band.
[[row]]
height = { length = 5 }
flex = "center"
  [[row.child]]
  widget = "my_prs"
  width = { length = 34 }
  border = "top"
  title = "my PRs"
  [[row.child]]
  widget = "gap"
  width = { length = 2 }
  [[row.child]]
  widget = "review_queue"
  width = { length = 34 }
  border = "top"
  title = "review queue"

[[row]]
height = { length = 1 }

[[row]]
height = { length = 6 }
flex = "center"
  [[row.child]]
  widget = "recent"
  width = { length = 70 }
  border = "top"
  title = "recent"

[[row]]
height = { length = 1 }
