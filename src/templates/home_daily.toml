# home_daily — "everything at a glance" preset. Dense, information-heavy dashboard:
# date header + full outside panel (weather / sunrise / sunset / moon / season /
# zodiac) + time-elapsed gauges (year / month / week / day) + a month calendar, so
# the user can cd once in the morning and read out the whole day. Use `home_splash`
# for the sparse animated alternative.
#
# Edit the `[widget.options]` for `weather` / `sunrise` to your latitude / longitude.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "clock"
format = "%a %e"
render = { type = "text_ascii", style = "blocks", pixel_size = "quadrant", color = "panel_title", align = "center" }

[[widget]]
id = "date"
fetcher = "clock"
format = "%A  ·  %e %B %Y  ·  day %j of %Y"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "weather"
fetcher = "weather"
render = { type = "grid_table", layout = "rows" }
  [widget.options]
  latitude = 35.68
  longitude = 139.76
  units = "metric"

[[widget]]
id = "sunrise"
fetcher = "clock_sunrise"
render = { type = "grid_table", layout = "rows" }
  [widget.options]
  lat = 35.68
  lon = 139.76

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = "text_plain"
  [widget.options]
  kind = "moon_phase"

[[widget]]
id = "season"
fetcher = "clock_derived"
render = "text_plain"
  [widget.options]
  kind = "season"

[[widget]]
id = "zodiac"
fetcher = "clock_derived"
render = "text_plain"
  [widget.options]
  kind = "zodiac"

# Gauge labels padded to 5 characters so the bars line up vertically across rows.
[[widget]]
id = "year_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "year ", value_format = "percent" }
  [widget.options]
  period = "year"

[[widget]]
id = "month_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "month", value_format = "percent" }
  [widget.options]
  period = "month"

[[widget]]
id = "week_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "week ", value_format = "percent" }
  [widget.options]
  period = "week"

[[widget]]
id = "day_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "day  ", value_format = "percent" }
  [widget.options]
  period = "day"

[[widget]]
id = "calendar"
fetcher = "clock"
render = { type = "grid_calendar", align = "center" }

# ── Layout ─────────────────────────────────────────────────────────

# Compact header — hero + date, no spacer rows between them.
[[row]]
height = { length = 4 }
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "date"

[[row]]
height = { length = 1 }

# Outside section: weather (3 rows) → sunrise/sunset (2 rows) → moon / season /
# zodiac (1 row each). 8 rows of content under a single centred section divider.
[[row]]
height = { length = 4 }
flex = "center"
  [[row.child]]
  widget = "weather"
  width = { length = 70 }
  border = "top"
  title = "  outside  "
  title_align = "center"

[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "sunrise"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "moon"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "season"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "zodiac"
  width = { length = 70 }

[[row]]
height = { length = 1 }

# Time-elapsed gauges stacked. First row carries the section divider; the others
# are plain 1-row gauges. Padded labels keep the bars aligned.
[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "year_ratio"
  width = { length = 70 }
  border = "top"
  title = "  time elapsed  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "month_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "week_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "day_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }

# Current month calendar with today highlighted. grid_calendar renders ~22 cells
# wide × 8 tall; the 70-col slot centres it with margin on either side.
[[row]]
height = { length = 9 }
flex = "center"
  [[row.child]]
  widget = "calendar"
  width = { length = 70 }
  border = "top"
  title = "  this month  "
  title_align = "center"

[[row]]
height = { length = 1 }
