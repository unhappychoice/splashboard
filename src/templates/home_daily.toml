# home_daily — "what day is it" preset. Large day-of-week + day-of-month block-font hero
# with the full date underneath, then two stacked sections: outside (weather / sunrise /
# moon) and time (year / month / week / day elapsed fractions). Both sections share the
# 70-col content band the rest of the 0.x presets use.
#
# Edit the `[widget.options]` for `weather` / `sunrise` to your latitude / longitude.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "clock"
format = "%a %e"
render = { type = "text_ascii", style = "blocks", pixel_size = "quadrant", color = "panel_title", align = "center" }

[[widget]]
id = "date"
fetcher = "clock"
format = "%e %B %Y  ·  %A"
render = { type = "text_plain", align = "center" }

# Weather in rows mode (3 key/value lines) so it stacks under the "outside" divider.
[[widget]]
id = "weather"
fetcher = "weather"
render = { type = "grid_table", layout = "rows" }
  [widget.options]
  latitude = 35.68
  longitude = 139.76
  units = "metric"

[[widget]]
id = "sunrise"
fetcher = "clock_sunrise"
render = { type = "grid_table", layout = "inline" }
  [widget.options]
  lat = 35.68
  lon = 139.76

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = "text_plain"
  [widget.options]
  kind = "moon_phase"

# Gauge labels are right-padded to 5 characters so the bars line up vertically across
# year / month / week / day rows.
[[widget]]
id = "year_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "year ", value_format = "percent" }
  [widget.options]
  period = "year"

[[widget]]
id = "month_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "month", value_format = "percent" }
  [widget.options]
  period = "month"

[[widget]]
id = "week_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "week ", value_format = "percent" }
  [widget.options]
  period = "week"

[[widget]]
id = "day_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "day  ", value_format = "percent" }
  [widget.options]
  period = "day"

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Hero: quadrant-density block glyphs take ~4 rows at this font size. "Thu 23" ≈ 24
# cells wide; `align = "center"` in the render options centres it inside the row.
[[row]]
height = { length = 5 }
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "date"

[[row]]
height = { length = 1 }

# Outside section: weather stacked above sunrise + moon inside a 70-col centred band.
[[row]]
height = { length = 4 }
flex = "center"
  [[row.child]]
  widget = "weather"
  width = { length = 70 }
  border = "top"
  title = "  outside  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "sunrise"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "moon"
  width = { length = 70 }

[[row]]
height = { length = 1 }

# Time section: four gauges stacked. First row carries the section title; the rest
# are plain content rows. Labels are padded to 5 chars so the bars align.
[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "year_ratio"
  width = { length = 70 }
  border = "top"
  title = "  time  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "month_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "week_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "day_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
