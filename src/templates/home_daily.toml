# home_daily — "everything at a glance" preset. Dense dashboard built from widgets
# that work without any user configuration: quote of the day, month calendar, sky
# panel (moon / season / zodiac / chinese zodiac / iso week / day of year), world
# clock, system stats (uptime / cpu / memory / load), and time-elapsed gauges.
# Nothing here needs a latitude or GitHub token to come to life, so
# `splashboard install → home_daily` renders a filled dashboard on first run.
#
# For weather or sunrise/sunset you need latitude + longitude per widget; drop a
# `weather` or `clock_sunrise` block in `$HOME/.splashboard/home.dashboard.toml`.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "quote"
fetcher = "quote_of_day"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "hero"
fetcher = "clock"
format = "%a %e"
render = { type = "text_ascii", style = "blocks", pixel_size = "quadrant", color = "panel_title", align = "center" }

[[widget]]
id = "date"
fetcher = "clock"
format = "%A  ·  %e %B %Y  ·  day %j of %Y"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "calendar"
fetcher = "clock"
render = { type = "grid_calendar", align = "center" }

# Sky info — label / value rows in a 28 / 1 / 41 column grid.
[[widget]]
id = "moon_label"
fetcher = "static"
format = "moon"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "moon_phase"

[[widget]]
id = "season_label"
fetcher = "static"
format = "season"
render = { type = "text_plain", align = "right" }

# Add `hemisphere = "south"` under `[widget.options]` if you're below the equator
# (Sydney / Auckland / Buenos Aires etc.) — defaults to northern-hemisphere seasons.
[[widget]]
id = "season"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "season"

[[widget]]
id = "zodiac_label"
fetcher = "static"
format = "zodiac"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "zodiac"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "zodiac"

[[widget]]
id = "chinese_label"
fetcher = "static"
format = "chinese"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "chinese"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "chinese_zodiac"

[[widget]]
id = "iso_week_label"
fetcher = "static"
format = "iso week"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "iso_week"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "iso_week"

[[widget]]
id = "day_of_year_label"
fetcher = "static"
format = "day-of-year"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "day_of_year"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "day_of_year"

# World clock — UTC + four major cities. Each entry is either a plain IANA zone
# (displayed verbatim) or a `{ tz, label }` pair so the row header reads `NYC`
# instead of `America/New_York`. Edit to taste for your own cities.
[[widget]]
id = "world_clock"
fetcher = "clock_timezones"
format = "%H:%M"
render = { type = "grid_table", layout = "rows", column_align = ["right", "left"] }
  [widget.options]
  timezones = [
    "UTC",
    { tz = "America/New_York", label = "NYC" },
    { tz = "Europe/London", label = "London" },
    { tz = "Asia/Tokyo", label = "Tokyo" },
    { tz = "Australia/Sydney", label = "Sydney" },
  ]

# System stats — each widget is one row, keyed by a static label and paired with
# the live value in the same 28 / 1 / 41 column grid as the sky panel.
[[widget]]
id = "uptime_label"
fetcher = "static"
format = "uptime"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "uptime"
fetcher = "system_uptime"
render = { type = "text_plain", align = "left" }

[[widget]]
id = "cpu_label"
fetcher = "static"
format = "cpu"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "cpu"
fetcher = "system_cpu"
render = { type = "text_plain", align = "left" }

[[widget]]
id = "memory_label"
fetcher = "static"
format = "memory"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "memory"
fetcher = "system_memory"
render = { type = "text_plain", align = "left" }

[[widget]]
id = "load_label"
fetcher = "static"
format = "load"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "load"
fetcher = "system_load"
render = { type = "text_plain", align = "left" }

# Gauge labels padded to 5 characters so the bars line up vertically across rows.
[[widget]]
id = "year_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "year ", value_format = "percent" }
  [widget.options]
  period = "year"

[[widget]]
id = "quarter_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "qtr  ", value_format = "percent" }
  [widget.options]
  period = "quarter"

[[widget]]
id = "month_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "month", value_format = "percent" }
  [widget.options]
  period = "month"

[[widget]]
id = "week_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "week ", value_format = "percent" }
  [widget.options]
  period = "week"

[[widget]]
id = "day_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "day  ", value_format = "percent" }
  [widget.options]
  period = "day"

[[widget]]
id = "gap"
fetcher = "static"
format = " "
render = "text_plain"

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Quote of the day — two centred lines (quote + " — author") at the top of the
# splash. Deterministic per calendar day; rotates at midnight.
[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "quote"
  width = { length = 88 }

[[row]]
height = { length = 1 }

# Compact header — hero + date, no spacer between them.
[[row]]
height = { length = 4 }
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "date"

[[row]]
height = { length = 1 }

# This month — calendar fills the 8-row band (month header + weekday header + 5
# week rows + 1 border rule).
[[row]]
height = { length = 8 }
flex = "center"
  [[row.child]]
  widget = "calendar"
  width = { length = 70 }
  border = "top"
  title = "  this month  "
  title_align = "center"

[[row]]
height = { length = 1 }

