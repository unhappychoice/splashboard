# home_daily — "everything at a glance" preset. Dense dashboard: date header +
# side-by-side weather / calendar at the top, sun & moon details underneath, and
# time-elapsed gauges (year / month / week / day) at the bottom.
#
# Edit the `[widget.options]` for `weather` / `sunrise` to your latitude / longitude.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "clock"
format = "%a %e"
render = { type = "text_ascii", style = "blocks", pixel_size = "quadrant", color = "panel_title", align = "center" }

[[widget]]
id = "date"
fetcher = "clock"
format = "%A  ·  %e %B %Y  ·  day %j of %Y"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "weather"
fetcher = "weather"
render = { type = "grid_table", layout = "rows" }
  [widget.options]
  latitude = 35.68
  longitude = 139.76
  units = "metric"

[[widget]]
id = "calendar"
fetcher = "clock"
render = { type = "grid_calendar", align = "center" }

# `sun & moon` items rendered as a label / value pair per row so each line is
# vertically aligned (same column for all labels, same column for all values),
# mirroring the key/value table layout on the outside panel.
[[widget]]
id = "sunrise"
fetcher = "clock_sunrise"
render = { type = "grid_table", layout = "rows", column_align = ["right", "left"] }
  [widget.options]
  lat = 35.68
  lon = 139.76

[[widget]]
id = "moon_label"
fetcher = "static"
format = "moon"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "moon_phase"

[[widget]]
id = "season_label"
fetcher = "static"
format = "season"
render = { type = "text_plain", align = "right" }

# Add `hemisphere = "south"` under `[widget.options]` if you're below the equator
# (Sydney / Auckland / Buenos Aires etc.) — defaults to northern-hemisphere seasons.
[[widget]]
id = "season"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "season"

[[widget]]
id = "zodiac_label"
fetcher = "static"
format = "zodiac"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "zodiac"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "zodiac"

# Gauge labels padded to 5 characters so the bars line up vertically across rows.
[[widget]]
id = "year_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "year ", value_format = "percent" }
  [widget.options]
  period = "year"

[[widget]]
id = "month_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "month", value_format = "percent" }
  [widget.options]
  period = "month"

[[widget]]
id = "week_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "week ", value_format = "percent" }
  [widget.options]
  period = "week"

[[widget]]
id = "day_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "day  ", value_format = "percent" }
  [widget.options]
  period = "day"

[[widget]]
id = "gap"
fetcher = "static"
format = " "
render = "text_plain"

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Compact header — hero + date, no spacer row between them.
[[row]]
height = { length = 4 }
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "date"

[[row]]
height = { length = 1 }

# Weather | calendar — two 34-col columns side by side inside the 70-col band. The
# row is sized to fit a full month calendar (8 rows = border + weekday header + 5
# week-rows + bottom padding); weather renders 3 rows of key/value and leaves the
# rest blank, keeping the two panels vertically aligned without stretching either.
[[row]]
height = { length = 8 }
flex = "center"
  [[row.child]]
  widget = "weather"
  width = { length = 34 }
  border = "top"
  title = "  outside  "
  title_align = "center"
  [[row.child]]
  widget = "gap"
  width = { length = 2 }
  [[row.child]]
  widget = "calendar"
  width = { length = 34 }
  border = "top"
  title = "  this month  "
  title_align = "center"

[[row]]
height = { length = 1 }

# Sun & moon details. Sunrise/sunset render as a grid_table rows (key/value). The
# three derived values (moon / season / zodiac) sit under them as label + value
# pairs so the whole section reads as one aligned two-column table.
[[row]]
height = { length = 3 }
flex = "center"
  [[row.child]]
  widget = "sunrise"
  width = { length = 70 }
  border = "top"
  title = "  sun & moon  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "moon_label"
  width = { length = 28 }
  [[row.child]]
  widget = "gap"
  width = { length = 1 }
  [[row.child]]
  widget = "moon"
  width = { length = 41 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "season_label"
  width = { length = 28 }
  [[row.child]]
  widget = "gap"
  width = { length = 1 }
  [[row.child]]
  widget = "season"
  width = { length = 41 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "zodiac_label"
  width = { length = 28 }
  [[row.child]]
  widget = "gap"
  width = { length = 1 }
  [[row.child]]
  widget = "zodiac"
  width = { length = 41 }

[[row]]
height = { length = 1 }

# Time-elapsed gauges stacked. First row carries the section divider; the others
# are plain 1-row gauges. Padded labels keep the bars aligned.
[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "year_ratio"
  width = { length = 70 }
  border = "top"
  title = "  time elapsed  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "month_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "week_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "day_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
