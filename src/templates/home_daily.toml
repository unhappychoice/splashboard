# home_daily — "everything at a glance" preset. Dense dashboard built from widgets
# that work without any user configuration: date / month calendar / sky info (moon
# phase, season, zodiac) / time-elapsed gauges. Nothing here needs a latitude or
# GitHub token to come to life, so `splashboard install` → `home_daily` renders a
# filled dashboard on first run.
#
# For weather or sunrise/sunset you need latitude + longitude per widget; drop a
# `weather` or `clock_sunrise` block in `$HOME/.splashboard/home.dashboard.toml`
# with your own coordinates.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "clock"
format = "%a %e"
render = { type = "text_ascii", style = "blocks", pixel_size = "quadrant", color = "panel_title", align = "center" }

[[widget]]
id = "date"
fetcher = "clock"
format = "%A  ·  %e %B %Y  ·  day %j of %Y"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "calendar"
fetcher = "clock"
render = { type = "grid_calendar", align = "center" }

# Sky info — label + value pairs that don't need location config. Each widget is a
# single row; the row layout pins them into the same 28 / 1 / 41 cell columns so
# every label ends at the same cell and every value starts at the same cell.
[[widget]]
id = "moon_label"
fetcher = "static"
format = "moon"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "moon_phase"

[[widget]]
id = "season_label"
fetcher = "static"
format = "season"
render = { type = "text_plain", align = "right" }

# Add `hemisphere = "south"` under `[widget.options]` if you're below the equator
# (Sydney / Auckland / Buenos Aires etc.) — defaults to northern-hemisphere seasons.
[[widget]]
id = "season"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "season"

[[widget]]
id = "zodiac_label"
fetcher = "static"
format = "zodiac"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "zodiac"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "zodiac"

[[widget]]
id = "chinese_label"
fetcher = "static"
format = "chinese"
render = { type = "text_plain", align = "right" }

[[widget]]
id = "chinese"
fetcher = "clock_derived"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "chinese_zodiac"

# Gauge labels padded to 5 characters so the bars line up vertically across rows.
[[widget]]
id = "year_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "year ", value_format = "percent" }
  [widget.options]
  period = "year"

[[widget]]
id = "quarter_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "qtr  ", value_format = "percent" }
  [widget.options]
  period = "quarter"

[[widget]]
id = "month_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "month", value_format = "percent" }
  [widget.options]
  period = "month"

[[widget]]
id = "week_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "week ", value_format = "percent" }
  [widget.options]
  period = "week"

[[widget]]
id = "day_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "day  ", value_format = "percent" }
  [widget.options]
  period = "day"

[[widget]]
id = "gap"
fetcher = "static"
format = " "
render = "text_plain"

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Compact header — hero + date, no spacer row between them.
[[row]]
height = { length = 4 }
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "date"

[[row]]
height = { length = 1 }

# This month — calendar (month header + weekday header + 5 week rows = 7 content
# rows, plus 1 border = 8 tall). Centred inside the 70-col body band.
[[row]]
height = { length = 8 }
flex = "center"
  [[row.child]]
  widget = "calendar"
  width = { length = 70 }
  border = "top"
  title = "  this month  "
  title_align = "center"

[[row]]
height = { length = 1 }

# Sky info — label / value rows under a centred section divider. Dedicated 1-row
# header carries the `─── sky ───` band; subsequent rows are plain 3-cell
# label / gap / value layouts in 28 / 1 / 41 (matches ratatui Table's default
# 40 / 1 / 60 split so the sky values align with the time-elapsed values below).
[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "gap"
  width = { length = 70 }
  border = "top"
  title = "  sky  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "moon_label"
  width = { length = 28 }
  [[row.child]]
  widget = "gap"
  width = { length = 1 }
  [[row.child]]
  widget = "moon"
  width = { length = 41 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "season_label"
  width = { length = 28 }
  [[row.child]]
  widget = "gap"
  width = { length = 1 }
  [[row.child]]
  widget = "season"
  width = { length = 41 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "zodiac_label"
  width = { length = 28 }
  [[row.child]]
  widget = "gap"
  width = { length = 1 }
  [[row.child]]
  widget = "zodiac"
  width = { length = 41 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "chinese_label"
  width = { length = 28 }
  [[row.child]]
  widget = "gap"
  width = { length = 1 }
  [[row.child]]
  widget = "chinese"
  width = { length = 41 }

[[row]]
height = { length = 1 }

# Time-elapsed gauges stacked: year / quarter / month / week / day. Labels are
# right-padded to 5 characters so the bars line up across all rows.
[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "year_ratio"
  width = { length = 70 }
  border = "top"
  title = "  time elapsed  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "quarter_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "month_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "week_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "day_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
