# home_splash — "hello terminal" preset. Terminal name rendered as a big block-font
# hero with a sweep-in postfx, a `terminal · powered by …` attribution underneath, then
# two stacked sections: a today divider with date/weather/moon and a quiet year-progress
# gauge. All body rows share a 70-col content band.
#
# Edit the `[widget.options]` for `weather` / `sunrise` to your latitude / longitude.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "system"
render = { type = "animated_postfx", inner = "text_ascii", effect = "sweep_in", duration_ms = 1200, style = "blocks", pixel_size = "quadrant", color = "panel_title", align = "center" }
  [widget.options]
  kind = "terminal"

# Attribution is a 2-widget row: fixed prefix + dynamic OS version. Keeping it a pair
# of widgets means the prefix stays editable without baking the OS name into TOML.
[[widget]]
id = "attribution_prefix"
fetcher = "static"
format = "terminal · powered by "
render = { type = "text_plain", align = "right" }

[[widget]]
id = "attribution_os"
fetcher = "system"
render = { type = "text_plain", align = "left" }
  [widget.options]
  kind = "os_version"

[[widget]]
id = "date_bar"
fetcher = "clock"
format = "%e %B %Y  ·  %A  ·  %H:%M"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "weather"
fetcher = "weather"
render = { type = "grid_table", layout = "inline", align = "center" }
  [widget.options]
  latitude = 35.68
  longitude = 139.76
  units = "metric"

[[widget]]
id = "sunrise"
fetcher = "clock_sunrise"
render = { type = "grid_table", layout = "inline", align = "center" }
  [widget.options]
  lat = 35.68
  lon = 139.76

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = { type = "text_plain", align = "center" }
  [widget.options]
  kind = "moon_phase"

[[widget]]
id = "season"
fetcher = "clock_derived"
render = { type = "text_plain", align = "center" }
  [widget.options]
  kind = "season"

[[widget]]
id = "year_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "year ", value_format = "percent" }
  [widget.options]
  period = "year"

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Hero: block-style glyphs (quadrant density) via tui-big-text, with a sweep-in postfx.
[[row]]
height = { length = 5 }
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }

# Attribution: `terminal · powered by ` + system os_version, right+left justified at
# the seam so they read as one line rather than two centred fragments.
[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "attribution_prefix"
  width = { length = 23 }
  [[row.child]]
  widget = "attribution_os"
  width = { length = 20 }

[[row]]
height = { length = 1 }

[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "date_bar"
  width = { length = 70 }
  border = "top"
  title = "  today  "
  title_align = "center"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "weather"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "sunrise"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "moon"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "season"
  width = { length = 70 }

[[row]]
height = { length = 1 }

[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "year_ratio"
  width = { length = 70 }
  border = "top"
  title = "  year  "
  title_align = "center"

[[row]]
height = { length = 1 }
