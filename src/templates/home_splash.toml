# home_splash — "hello terminal" preset. Terminal name rendered as a giant figlet banner
# with a sweep-in postfx as the hero, OS version underneath as attribution, and a single
# ambient band (date + weather + sunrise + moon) plus a year-progress gauge sitting
# quietly at the bottom. All body rows share a 70-col content band (centered) so the
# section divider, ambient lines, and gauge line up at the same left/right edges.
#
# Edit the `[widget.options]` for `weather` / `sunrise` to your latitude / longitude.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "system"
render = { type = "animated_postfx", inner = "text_ascii", effect = "coalesce", duration_ms = 1500, style = "figlet", font = "banner", color = "panel_title", align = "center" }
  [widget.options]
  kind = "terminal"

[[widget]]
id = "attribution"
fetcher = "system"
render = { type = "text_plain", align = "center" }
  [widget.options]
  kind = "os_version"

[[widget]]
id = "date_bar"
fetcher = "clock"
format = "%e %B %Y  ·  %A  ·  %H:%M"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "weather"
fetcher = "weather"
render = { type = "grid_table", layout = "inline", align = "center" }
  [widget.options]
  latitude = 35.68
  longitude = 139.76
  units = "metric"

[[widget]]
id = "sunrise"
fetcher = "clock_sunrise"
render = { type = "grid_table", layout = "inline", align = "center" }
  [widget.options]
  lat = 35.68
  lon = 139.76

[[widget]]
id = "moon"
fetcher = "clock_derived"
render = { type = "text_plain", align = "center" }
  [widget.options]
  kind = "moon_phase"

[[widget]]
id = "year_ratio"
fetcher = "clock_ratio"
render = { type = "gauge_line", label = "year", value_format = "percent" }
  [widget.options]
  period = "year"

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Hero gets the full row width — figlet `banner` is 8 rows tall and wide; the inner
# `align = "center"` on the render options recenters it against the full area.
[[row]]
height = { length = 8 }
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 1 }
  [[row.child]]
  widget = "attribution"

[[row]]
height = { length = 1 }

# Section divider over the ambient band. Height 2 = 1 border rule + 1 content row.
# Everything below shares the same 70-col centred column so border title, ambient
# lines, and the year gauge line up cleanly at the edges.
[[row]]
height = { length = 2 }
flex = "center"
  [[row.child]]
  widget = "date_bar"
  width = { length = 70 }
  border = "top"
  title = "today"

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "weather"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "sunrise"
  width = { length = 70 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "moon"
  width = { length = 70 }

[[row]]
height = { length = 1 }

[[row]]
height = { length = 1 }
flex = "center"
  [[row.child]]
  widget = "year_ratio"
  width = { length = 70 }

[[row]]
height = { length = 1 }
