<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- OG card. Uses the Splash default theme so anyone who's seen the landing
       recognises the palette. Keep layout static (no JS / webfonts) so sharp
       rasterisation in scripts/build-og.mjs stays deterministic. -->
  <defs>
    <style>
      .title { font: 700 160px "JetBrains Mono", ui-monospace, monospace; fill: #ff8c7a; }
      .tag   { font: 32px "JetBrains Mono", ui-monospace, monospace; fill: #c5d2dc; }
      .dim   { font: 26px "JetBrains Mono", ui-monospace, monospace; fill: #7ea0b5; }
    </style>
  </defs>

  <!-- Viewport bg -->
  <rect width="1200" height="630" fill="#0e172a"/>

  <!-- Terminal titlebar band -->
  <rect x="0" y="0" width="1200" height="72" fill="#17243b"/>
  <rect x="0" y="71" width="1200" height="1" fill="#4a6b75"/>
  <circle cx="48" cy="36" r="14" fill="#ff5f57"/>
  <circle cx="96" cy="36" r="14" fill="#febc2e"/>
  <circle cx="144" cy="36" r="14" fill="#28c840"/>

  <!-- Title -->
  <text x="80" y="280" class="title">splashboard</text>

  <!-- Tagline block -->
  <text x="82" y="360" class="tag">A customizable terminal splash —</text>
  <text x="82" y="404" class="tag">rendered on shell startup and on cd.</text>

  <!-- Accent footer: per-dir killer feature one-liner -->
  <text x="82" y="520" class="dim">per-directory configs · one splash per repo</text>

  <!-- Decorative: a muted heatmap row hinting at the contributions widget -->
  <g transform="translate(82, 560)" shape-rendering="crispEdges">
    <rect width="18" height="18" fill="#0a1424"/>
    <rect x="22" width="18" height="18" fill="#0d3f4a"/>
    <rect x="44" width="18" height="18" fill="#2a8c8f"/>
    <rect x="66" width="18" height="18" fill="#0d3f4a"/>
    <rect x="88" width="18" height="18" fill="#2a8c8f"/>
    <rect x="110" width="18" height="18" fill="#ff8c7a"/>
    <rect x="132" width="18" height="18" fill="#ffc66b"/>
    <rect x="154" width="18" height="18" fill="#0d3f4a"/>
    <rect x="176" width="18" height="18" fill="#0a1424"/>
    <rect x="198" width="18" height="18" fill="#2a8c8f"/>
    <rect x="220" width="18" height="18" fill="#ff8c7a"/>
    <rect x="242" width="18" height="18" fill="#ffc66b"/>
  </g>
</svg>
