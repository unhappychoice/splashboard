<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Rounded Splash-bg terminal window. Colours mirror Theme::default() in src/theme/mod.rs. -->
  <rect width="32" height="32" rx="5.5" fill="#0e172a"/>
  <path d="M0 5.5A5.5 5.5 0 0 1 5.5 0h21A5.5 5.5 0 0 1 32 5.5V9H0z" fill="#17243b"/>
  <rect x="0" y="8" width="32" height="1" fill="#4a6b75"/>
  <!-- Traffic-light dots: real macOS colours so the mark reads as "terminal" instantly. -->
  <circle cx="4" cy="4.5" r="1.3" fill="#ff5f57"/>
  <circle cx="8.5" cy="4.5" r="1.3" fill="#febc2e"/>
  <circle cx="13" cy="4.5" r="1.3" fill="#28c840"/>
  <!-- Mock widget bars in content area. Coral + cyan + dim text mirror the Splash palette. -->
  <rect x="5" y="14" width="7" height="2" fill="#ff8c7a"/>
  <rect x="5" y="18" width="14" height="2" fill="#5ed8e0"/>
  <rect x="5" y="22" width="10" height="2" fill="#7ea0b5"/>
  <rect x="5" y="26" width="17" height="2" fill="#c5d2dc"/>
</svg>
