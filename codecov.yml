coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, files"
  behavior: default
  require_changes: false

ignore:
  - "xtask/**"
  - "src/render/test_utils.rs"
  - "docs-site/**"
  - "**/tests/**"
